<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mischenko.edu — Кабинет ученика</title>
    <style>
        :root {
            --bg: #060b14;
            --surface: rgba(12, 20, 40, 0.75);
            --border: rgba(255, 255, 255, 0.06);
            --accent: #4ade80;
            --red: #ef4444;
            --yellow: #facc15;
            --blue: #60a5fa;
            --text: #e8ecf2;
            --text-dim: #7a8ba6;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .screen { display: none; max-width: 420px; width: 100%; }
        .screen.active { display: block; }
        .logo {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 20px; text-align: center;
        }
        .logo span { color: var(--accent); }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px 16px;
            backdrop-filter: blur(12px); text-align: left; margin-bottom: 12px;
        }
        .card h2 { font-size: 16px; margin-bottom: 10px; font-weight: 700; text-align: center; }
        .card p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 8px; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-size: 15px;
            font-family: inherit; outline: none;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent); }
        .btn {
            display: block; width: 100%; padding: 14px; margin-top: 8px;
            border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
            border: none; font-family: inherit; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-accent { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.2); color: var(--accent); }
        .btn-accent:active { background: rgba(74,222,128,0.25); }
        .btn-blue { background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.2); color: var(--blue); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn-ghost:active { border-color: rgba(255,255,255,0.2); }
        .error { color: var(--red); font-size: 12px; margin-top: 6px; display: none; }
        .error.show { display: block; }

        .greeting { margin-bottom: 12px; }
        .greeting .name { font-size: 22px; font-weight: 800; display: block; }
        .greeting .sub { font-size: 12px; color: var(--text-dim); }
        .quote-box {
            background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.1);
            border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px;
            font-size: 13px; color: var(--accent); font-style: italic; text-align: center;
        }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin: 8px 0 14px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; box-shadow: 0 0 10px rgba(74,222,128,0.3); }
        .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .widget {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px; text-align: center;
        }
        .widget .w-icon { font-size: 20px; margin-bottom: 2px; }
        .widget .w-value { font-size: 18px; font-weight: 800; }
        .widget .w-label { font-size: 10px; color: var(--text-dim); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .menu-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px 8px; text-align: center;
            cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .menu-item:active { background: rgba(255,255,255,0.05); }
        .menu-item .m-icon { font-size: 22px; margin-bottom: 4px; display: block; }

        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; margin-top: 8px; }
        .back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px; }
        .section-title { font-weight: 700; font-size: 17px; }
        .tracker-row, .hw-row, .report-row {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px; margin-bottom: 6px;
            display: flex; align-items: center; gap: 10px; font-size: 13px;
        }
        .tracker-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .tracker-fill { height: 100%; border-radius: 3px; }
        .tracker-pct { font-weight: 600; font-size: 12px; width: 32px; text-align: right; }
        .hw-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .hw-info, .report-info { flex: 1; }
        .hw-title, .report-month { font-weight: 600; }
        .hw-date, .report-detail { font-size: 11px; color: var(--text-dim); }
        .hw-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
        .cheat-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; cursor: pointer;
        }
        .cheat-item summary { font-weight: 600; font-size: 14px; }
        .cheat-item pre {
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;
            margin-top: 8px; font-size: 11px; color: var(--accent); white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .achievement-card {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px; margin-bottom: 6px;
        }
        .achievement-card.locked { opacity: 0.4; }
        .ach-icon { font-size: 28px; }
        .ach-info { flex: 1; }
        .ach-title { font-size: 13px; font-weight: 600; }
        .ach-desc { font-size: 11px; color: var(--text-dim); }
        .goal-card {
            background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.1);
            border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px;
        }
        .goal-card .goal-title { font-size: 12px; color: var(--text-dim); }
        .goal-card .goal-text { font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 2px; }
    </style>
</head>
<body>

<!-- ЭКРАН ЗАГРУЗКИ (проверка авто-входа) -->
<div class="screen active" id="screen-loading">
    <div class="logo">mischenko<span>.edu</span></div>
    <p style="text-align:center;color:var(--text-dim);">Загрузка...</p>
</div>

<!-- ДАШБОРД -->
<div class="screen" id="screen-dashboard">
    <div class="logo">mischenko<span>.edu</span></div>
    <div class="greeting">
        <span class="name" id="dash-greeting"></span>
        <span class="sub" id="dash-hint"></span>
    </div>
    <div class="goal-card" id="goal-card" style="display:none;">
        <div class="goal-title">🎯 Твоя цель</div>
        <div class="goal-text" id="goal-text"></div>
    </div>
    <div class="quote-box" id="quote-box"></div>
    <div class="progress-bar"><div class="progress-fill" id="dash-progress" style="width:0%"></div></div>
    <div class="widget-grid">
        <div class="widget"><div class="w-icon">📈</div><div class="w-value" id="dash-topics">-</div><div class="w-label">Тем пройдено</div></div>
        <div class="widget"><div class="w-icon">📝</div><div class="w-value" id="dash-homework">-</div><div class="w-label">Домашек сдано</div></div>
        <div class="widget"><div class="w-icon">🏆</div><div class="w-value" id="dash-achievements">-</div><div class="w-label">Ачивок</div></div>
        <div class="widget"><div class="w-icon">📅</div><div class="w-value" id="dash-lessons">-</div><div class="w-label">Занятий на неделе</div></div>
    </div>
    <div class="menu-grid">
        <div class="menu-item" id="menu-tracker"><span class="m-icon">📈</span>Трекер</div>
        <div class="menu-item" id="menu-homework"><span class="m-icon">📝</span>Домашки</div>
        <div class="menu-item" id="menu-cheatsheet"><span class="m-icon">📘</span>Шпаргалки</div>
        <div class="menu-item" id="menu-achievements"><span class="m-icon">🏆</span>Ачивки</div>
        <div class="menu-item" id="menu-reports"><span class="m-icon">📊</span>Отчёты</div>
        <div class="menu-item" id="menu-calendar"><span class="m-icon">📅</span>Календарь</div>
    </div>
    <button class="btn btn-blue" id="btn-chat">💬 Написать учителю</button>
    <button class="btn btn-ghost" id="menu-logout" style="margin-top:4px;">🚪 Выйти</button>
</div>

<!-- РАЗДЕЛЫ -->
<div class="screen" id="screen-section">
    <div class="logo" style="margin-bottom:8px;">mischenko<span>.edu</span></div>
    <div class="section-header">
        <button class="back-btn" id="btn-section-back">←</button>
        <div class="section-title" id="section-title"></div>
    </div>
    <div id="section-content"></div>
</div>

<script>
    (function() {
        const API = 'https://mischenko-edu-api.onrender.com/api';
        let user = null;
        const quotes = [
            '«Не бойся ошибаться — бойся не пробовать.»',
            '«Код работает не магией, а твоим трудом.»',
            '«Каждая ошибка — шаг к пониманию.»',
            '«Программирование — это искусство решения проблем.»',
            '«Ты уже на шаг ближе к цели, чем вчера.»',
        ];

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Проверка авто-входа при загрузке
        async function autoLogin() {
            const savedPhone = localStorage.getItem('user_phone');
            const savedId = localStorage.getItem('user_id');
            if (savedPhone && savedId) {
                try {
                    const res = await fetch(API + '/check-phone', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: savedPhone })
                    });
                    const data = await res.json();
                    if (data.exists && data.user.id == savedId) {
                        user = data.user;
                        loadDashboard();
                        show('screen-dashboard');
                        return;
                    }
                } catch(e) {}
            }
            // Не вошёл — возвращаемся в index.html
            window.location.href = 'https://katmischenko.github.io/mischenko-edu/frontend/index.html';
        }

        function loadDashboard() {
            const hour = new Date().getHours();
            let time = 'Доброй ночи';
            if (hour >= 6 && hour < 12) time = 'Доброе утро';
            else if (hour >= 12 && hour < 17) time = 'Добрый день';
            else if (hour >= 17 && hour < 23) time = 'Добрый вечер';

            document.getElementById('dash-greeting').textContent = `${time}, ${user.name}!`;
            document.getElementById('dash-hint').textContent = `Курс: ${user.course || 'Не выбран'}`;
            document.getElementById('quote-box').textContent = quotes[Math.floor(Math.random() * quotes.length)];

            fetch(API + '/tracker/' + user.id).then(r => r.json()).then(d => {
                const topics = d.data || [];
                const done = topics.filter(t => t.status === 'Пройдено').length;
                const avg = topics.length > 0 ? Math.round(topics.reduce((s,t) => s + t.understanding, 0) / topics.length) : 0;
                document.getElementById('dash-topics').textContent = `${done}/${topics.length}`;
                document.getElementById('dash-progress').style.width = avg + '%';
                document.getElementById('dash-achievements').textContent = done >= 1 ? '1' : '0';
            }).catch(() => {});
            fetch(API + '/homework/' + user.id).then(r => r.json()).then(d => {
                const hw = d.data || [];
                const done = hw.filter(h => h.status === 'Принято').length;
                document.getElementById('dash-homework').textContent = `${done}/${hw.length}`;
            }).catch(() => {});
            document.getElementById('dash-lessons').textContent = '0';
        }

        // Меню
        document.getElementById('menu-tracker').addEventListener('click', () => loadSection('📈 Трекер', 'tracker'));
        document.getElementById('menu-homework').addEventListener('click', () => loadSection('📝 Домашки', 'homework'));
        document.getElementById('menu-cheatsheet').addEventListener('click', () => loadSection('📘 Шпаргалки', 'cheatsheet'));
        document.getElementById('menu-achievements').addEventListener('click', () => loadSection('🏆 Ачивки', 'achievements'));
        document.getElementById('menu-reports').addEventListener('click', () => loadSection('📊 Отчёты', 'reports'));
        document.getElementById('menu-calendar').addEventListener('click', () => loadSection('📅 Календарь', 'calendar'));
        document.getElementById('menu-logout').addEventListener('click', () => {
            localStorage.removeItem('user_phone');
            localStorage.removeItem('user_id');
            window.location.href = 'https://katmischenko.github.io/mischenko-edu/frontend/index.html';
        });
        document.getElementById('btn-chat').addEventListener('click', () => {
            window.Telegram.WebApp.openTelegramLink('https://t.me/katerin_mischenko');
        });
        document.getElementById('btn-section-back').addEventListener('click', () => show('screen-dashboard'));

        function loadSection(title, type) {
            document.getElementById('section-title').textContent = title;
            const content = document.getElementById('section-content');
            if (type === 'tracker') {
                fetch(API + '/tracker/' + user.id).then(r => r.json()).then(d => {
                    content.innerHTML = (d.data || []).map(t => {
                        let color = t.understanding < 50 ? '#ef4444' : t.understanding < 80 ? '#facc15' : '#4ade80';
                        return `<div class="tracker-row"><span>${t.status==='Пройдено'?'✅':t.status==='В процессе'?'🔄':'⬜'}</span><span style="flex:1;">${t.topic}</span><div class="tracker-bar"><div class="tracker-fill" style="width:${t.understanding}%;background:${color};"></div></div><span class="tracker-pct">${t.understanding}%</span></div>`;
                    }).join('') || '<p style="color:var(--text-dim);">Нет данных</p>';
                }).catch(() => { content.innerHTML = '<p style="color:var(--text-dim);">Ошибка загрузки</p>'; });
            } else if (type === 'homework') {
                fetch(API + '/homework/' + user.id).then(r => r.json()).then(d => {
                    content.innerHTML = (d.data || []).map(h => {
                        let dot = '#4ade80', tag = 'Принято', bg = 'rgba(74,222,128,0.15)', tc = '#4ade80';
                        if (h.status === 'В процессе') { dot = '#facc15'; tag = 'В процессе'; bg = 'rgba(250,204,21,0.15)'; tc = '#facc15'; }
                        if (h.status === 'Просрочено') { dot = '#ef4444'; tag = 'Срочно'; bg = 'rgba(239,68,68,0.15)'; tc = '#ef4444'; }
                        return `<div class="hw-row"><span class="hw-dot" style="background:${dot};"></span><div class="hw-info"><div class="hw-title">${h.title}</div><div class="hw-date">${h.deadline||''}</div></div><span class="hw-tag" style="background:${bg};color:${tc};">${tag}</span></div>`;
                    }).join('') || '<p style="color:var(--text-dim);">Нет заданий</p>';
                }).catch(() => { content.innerHTML = '<p style="color:var(--text-dim);">Ошибка загрузки</p>'; });
            } else if (type === 'cheatsheet') {
                fetch(API + '/cheatsheets/' + encodeURIComponent(user.course || 'Индивидуальный курс')).then(r => r.json()).then(d => {
                    content.innerHTML = (d.data || []).map(c => `<details class="cheat-item"><summary>${c.title}</summary><pre>${c.content}</pre></details>`).join('') || '<p style="color:var(--text-dim);">Нет шпаргалок</p>';
                }).catch(() => { content.innerHTML = '<p style="color:var(--text-dim);">Ошибка загрузки</p>'; });
            } else if (type === 'achievements') {
                content.innerHTML = `<div class="card"><h3>⭐ Заработанные</h3><div class="achievement-card"><span class="ach-icon">⭐</span><div class="ach-info"><div class="ach-title">Первая программа</div><div class="ach-desc">Написал свой первый код</div></div></div></div><div class="card"><h3>🔒 Ещё не открыты</h3><div class="achievement-card locked"><span class="ach-icon">💫</span><div class="ach-info"><div class="ach-title">Мастер циклов</div><div class="ach-desc">Решить 20 задач на циклы</div></div></div></div>`;
            } else if (type === 'reports') {
                fetch(API + '/reports/' + user.id).then(r => r.json()).then(d => {
                    content.innerHTML = (d.data || []).map(r => `<div class="report-row"><div class="report-info"><div class="report-month">📅 ${r.month}</div><div class="report-detail">Занятий: ${r.lessons_done} | Домашек: ${r.homework_done} | Балл: ${r.score||'-'}</div></div></div>`).join('') || '<p style="color:var(--text-dim);">Нет отчётов</p>';
                }).catch(() => { content.innerHTML = '<p style="color:var(--text-dim);">Ошибка загрузки</p>'; });
            } else {
                content.innerHTML = '<p style="color:var(--text-dim);text-align:center;">📅 Расписание появится здесь.<br><br>Пока запишись через чат с учителем.</p>';
            }
            show('screen-section');
        }

        // Запуск
        autoLogin();
    })();
</script>

</body>
</html>
