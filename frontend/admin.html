<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mischenko.edu — Админ-панель</title>
    <style>
        :root {
            --bg: #060b14;
            --surface: rgba(12, 20, 40, 0.75);
            --border: rgba(255, 255, 255, 0.06);
            --accent: #4ade80;
            --text: #e8ecf2;
            --text-dim: #7a8ba6;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logo span { color: var(--accent); }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            backdrop-filter: blur(12px);
            margin-bottom: 14px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; font-weight: 700; }
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .student-row:last-child { border-bottom: none; }
        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.green { background: rgba(74,222,128,0.15); color: var(--accent); }
        .badge.blue { background: rgba(96,165,250,0.15); color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">mischenko<span>.edu</span> <span style="font-size:12px;color:var(--text-dim);">админ</span></div>

        <div class="card">
            <h2>👥 Ученики</h2>
            <div class="student-row">
                <span>Илья</span>
                <span>ЕГЭ информатика</span>
                <span class="badge green">78%</span>
            </div>
            <div class="student-row">
                <span>Анна</span>
                <span>Python</span>
                <span class="badge green">90%</span>
            </div>
            <div class="student-row">
                <span>Дима</span>
                <span>Scratch</span>
                <span class="badge blue">60%</span>
            </div>
        </div>

        <div class="card">
            <h2>📊 Статистика</h2>
            <p style="font-size:14px;color:var(--text-dim);">Учеников: 14 | Занятий сегодня: 5 | Доход в июне: 186 000 ₽</p>
        </div>
    </div>
</body>
</html>
